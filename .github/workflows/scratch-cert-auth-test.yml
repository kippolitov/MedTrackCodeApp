name: SCRATCH - Cert Auth Test

# Throwaway diagnostic workflow. Tests whether certificate-based service
# principal auth avoids the persistent HTTP 500 on `pac code push` that
# client-secret-based SP auth always hits. Not part of the real pipeline --
# delete once the experiment concludes either way.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install pac CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          add-tools-to-path: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:ci

      - name: Render power.config.json
        shell: pwsh
        env:
          PP_ENVIRONMENT_ID: ${{ vars.PP_ENVIRONMENT_ID }}
          PP_APP_ID: ${{ vars.PP_APP_ID }}
        run: ./scripts/ci/render-power-config.ps1

      - name: Decode certificate
        shell: pwsh
        env:
          PP_CLIENT_CERT_PFX_BASE64: ${{ secrets.PP_CLIENT_CERT_PFX_BASE64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:PP_CLIENT_CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP/cert.pfx", $bytes)
          Write-Host "Certificate written to $env:RUNNER_TEMP/cert.pfx"

      - name: Authenticate via certificate
        shell: pwsh
        env:
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_CERT_PASSWORD: ${{ secrets.PP_CLIENT_CERT_PASSWORD }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_ENVIRONMENT_URL: ${{ vars.PP_ENVIRONMENT_URL }}
        run: |
          pac auth create `
            --applicationId $env:PP_CLIENT_ID `
            --certificateDiskPath "$env:RUNNER_TEMP/cert.pfx" `
            --certificatePassword $env:PP_CLIENT_CERT_PASSWORD `
            --tenant $env:PP_TENANT_ID `
            --environment $env:PP_ENVIRONMENT_URL
          if ($LASTEXITCODE -ne 0) {
              throw "pac auth create (certificate) failed (exit code $LASTEXITCODE)."
          }
          Write-Host "Authenticated via certificate successfully."

      - name: Deploy Code App (certificate auth test)
        shell: pwsh
        run: |
          pac --log-to-console code push 2>&1 | Tee-Object -Variable capturedOutput | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
              throw "pac code push failed (exit code $LASTEXITCODE)."
          }
          if ($capturedOutput -match 'HTTP error status') {
              throw "pac code push reported an HTTP error but exited 0 -- treating as a failure."
          }
          Write-Host "Code App pushed successfully via certificate auth."
