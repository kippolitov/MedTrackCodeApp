name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Target GitHub Environment (dev | production)
        required: true
        type: string
      migrate_data:
        description: Opt-in operational data migration (off by default — FR-016)
        required: false
        type: boolean
        default: false

# Serialize deploys to a given environment so concurrent runs cannot overwrite
# one another mid-deployment (FR-011). Never cancel an in-flight deploy.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install pac CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          add-tools-to-path: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:ci

      # --- Schema (US3, FR-007): must complete before the app push.
      # These official actions authenticate internally via their own
      # app-id/client-secret/tenant-id inputs; they don't need (or preserve)
      # a persisted `pac auth` profile.
      #
      # This reusable workflow is only used for `dev` -- it always packs and
      # imports Unmanaged. `<Managed>0</Managed>` is baked into
      # solution/src/Other/Solution.xml (recorded at unpack time), so
      # pack-solution cannot simply be told to emit Managed from this same
      # source tree (it errors: "Solution package type did not match
      # requested type" -- found live 2026-07-02). Production instead gets a
      # true managed solution via a live export-as-managed from dev,
      # implemented as separate jobs in promote-prod.yml.
      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: solution/src
          solution-file: out/MedTrackCore.zip
          solution-type: Unmanaged

      - name: Import solution
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ vars.PP_ENVIRONMENT_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: out/MedTrackCore.zip

      - name: Publish solution customizations
        uses: microsoft/powerplatform-actions/publish-solution@v1
        with:
          environment-url: ${{ vars.PP_ENVIRONMENT_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}

      # --- App (US2, FR-005): pac code push and pac data import (below) use
      # the pac CLI directly, so authenticate immediately before them here
      # rather than earlier — a profile created before the actions above ran
      # is not reliably present afterward.
      - name: Authenticate to Power Platform
        shell: pwsh
        env:
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_ENVIRONMENT_URL: ${{ vars.PP_ENVIRONMENT_URL }}
        run: ./scripts/deploy/auth.ps1

      - name: Render power.config.json
        shell: pwsh
        env:
          PP_ENVIRONMENT_ID: ${{ vars.PP_ENVIRONMENT_ID }}
          PP_APP_ID: ${{ vars.PP_APP_ID }}
        run: ./scripts/ci/render-power-config.ps1

      - name: Deploy Code App
        shell: pwsh
        run: ./scripts/deploy/deploy-app.ps1

      # --- Data (US3, FR-016): off by default, opt-in only, no record-content logging ---
      # `pac data import` does not exist in the PAC CLI (the only related tool,
      # `pac tool CMT`, is a Windows GUI executable and cannot run headlessly here),
      # so migration is a self-contained Web API upsert script instead — see
      # scripts/deploy/migrate-data.ps1 for the full rationale.
      - name: Migrate operational data (opt-in)
        if: ${{ inputs.migrate_data }}
        shell: pwsh
        env:
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_ENVIRONMENT_URL: ${{ vars.PP_ENVIRONMENT_URL }}
        run: ./scripts/deploy/migrate-data.ps1

      # --- Deployment record (FR-009) ---
      - name: Record deployment
        if: always()
        run: |
          {
            echo "### Deployment summary"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Data migration requested: \`${{ inputs.migrate_data }}\`"
            echo "- Outcome: \`${{ job.status }}\`"
            echo "- Timestamp: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
          } >> "$GITHUB_STEP_SUMMARY"
