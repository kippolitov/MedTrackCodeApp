name: Deploy to Dev

# Auto-deploys on merge to main (FR-005, FR-017). workflow_dispatch allows a
# manual re-run (e.g., for rollback, or to opt into data migration) — neither
# trigger is `pull_request`, so fork-originated PRs never reach this workflow
# and never see its secrets (FR-012).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      migrate_data:
        description: Migrate operational data this run? (off by default — FR-016)
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.reusable.yml
    with:
      environment: dev
      migrate_data: ${{ inputs.migrate_data || false }}
    secrets: inherit
