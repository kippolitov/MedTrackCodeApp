name: Promote to Production

# Manual promotion only (FR-017) — never triggered by push or pull_request.
# The `production` GitHub Environment's required reviewers enforce the
# approval gate (FR-014) before any step in deploy.reusable.yml runs.
on:
  workflow_dispatch:
    inputs:
      migrate_data:
        description: Migrate operational data this run? (off by default — FR-016)
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.reusable.yml
    with:
      environment: production
      migrate_data: ${{ inputs.migrate_data || false }}
    secrets: inherit
